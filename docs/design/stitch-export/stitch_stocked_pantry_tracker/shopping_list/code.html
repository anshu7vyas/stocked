<!-- Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const checkboxes = document.querySelectorAll('.custom-checkbox');
            const shoppingList = document.getElementById('shopping-list');
            const emptyState = document.getElementById('empty-state');

            checkboxes.forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    const parentCard = this.closest('.flex');
                    const label = parentCard.querySelector('span');
                    const iconBox = this.nextElementSibling;
                    const checkIcon = iconBox.querySelector('span');

                    if (this.checked) {
                        iconBox.classList.add('bg-primary', 'border-primary');
                        checkIcon.classList.remove('hidden');
                        label.classList.add('line-through', 'opacity-60');
                    } else {
                        iconBox.classList.remove('bg-primary', 'border-primary');
                        checkIcon.classList.add('hidden');
                        label.classList.remove('line-through', 'opacity-60');
                    }
                });
            });

            // Functional demo for adding items (UI only)
            const input = document.querySelector('input[type="text"]');
            const addButton = document.querySelector('.bg-primary.w-10');

            addButton.addEventListener('click', () => {
                if (input.value.trim() !== "") {
                    // Logic to add item could go here
                    input.value = "";
                }
            });
        });
    </script>
