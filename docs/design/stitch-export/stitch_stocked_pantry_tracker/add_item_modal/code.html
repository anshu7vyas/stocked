<script>
        // Simple logic for category selection visual toggle
        const categoryButtons = document.querySelectorAll('.category-chip');
        categoryButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryButtons.forEach(b => {
                    b.classList.remove('bg-secondary-container', 'text-on-secondary-container', 'border-primary/20');
                    b.classList.add('bg-surface-container-low', 'text-on-surface-variant');
                });
                btn.classList.add('bg-secondary-container', 'text-on-secondary-container', 'border-primary/20');
                btn.classList.remove('bg-surface-container-low', 'text-on-surface-variant');
            });
        });

        // Close logic mock
